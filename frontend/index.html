<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="facebook-domain-verification" content="qzkcn47p3xwvaid70pvi9tgcu80qkk" />
    <title>Tova Ads</title>
    <script>
      // FOUC 防御：在 CSS / Vue 加载前就定好主题，避免刷新时白底闪一下。
      // localStorage 键与 useTheme.js 一致（tova_theme，默认 dark）。
      (function () {
        var t = localStorage.getItem('tova_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <style>
      /* html 兜底背景：CSS 还没加载时也先铺上对应主题色，杜绝白闪 */
      html { background: #1a1a2e; }
      html[data-theme="light"] { background: #f5f5f7; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
